on:
  push:
    branches:
      - master

name: render-quarto-site

jobs:
  build-deploy:
    name: Render and Deploy Website & PDF
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # 1. Setup R Environment
      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      # 2. Setup Pandoc
      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      # 3. Install Quarto CLI
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # 4. Install R dependencies required by your project
      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("rmarkdown", "fontawesome", "webshot", "rsvg", "tinytex", "downloadthis"))'

      # 5. Install TinyTeX via Quarto CLI for PDF rendering
      - name: Install TinyTeX
        run: quarto install tinytex

      - name: Install phantomJS for webshot
        run: Rscript -e 'webshot::install_phantomjs()'

      # 6. Render the primary HTML Website
      - name: Render Quarto HTML Site
        uses: quarto-dev/quarto-actions/render@v2

      # 7. Run custom PDF sequence (Sanitize script + Book profile)
      - name: Render Quarto PDF Profile
        run: |
          Rscript sanitize.R
          quarto render --profile book --to pdf

      # 8. Create custom domain mapping in the built tracking folder
      - name: Create CNAME file
        uses: finnp/create-file-action@master
        env:
          FILE_NAME: "./docs/CNAME"
          FILE_DATA: "manual.obis.org"

      # 9. Deploy the completely compiled /docs directory (containing HTML + PDF) to gh-pages
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs